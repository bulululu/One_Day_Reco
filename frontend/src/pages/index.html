<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OneDayReco - 你的活动搭子</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color, #1a1a2e);
            min-height: 100vh; color: var(--text-color, #eee);
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s ease;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 480px; margin: 0 auto; min-height: 100vh;
            display: flex; flex-direction: column; position: relative;
        }

        /* ===== Ambient background glow ===== */
        .ambient-glow {
            position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
            width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            opacity: 0.06; pointer-events: none; z-index: 0;
            transition: background 0.6s ease;
        }
        .ambient-glow-2 {
            position: fixed; bottom: -10%; right: -10%;
            width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            opacity: 0.04; pointer-events: none; z-index: 0;
            transition: background 0.6s ease;
        }

        /* ===== Theme variables ===== */
        :root {
            --bg-color: #1a1a2e;
            --bg-grad-1: #1a1a2e;
            --bg-grad-2: #16132a;
            --card-color: rgba(255, 255, 255, 0.05);
            --card-solid: #23233a;
            --card-hover: rgba(255, 255, 255, 0.08);
            --accent-color: #89b4fa;
            --accent-soft: rgba(137, 180, 250, 0.12);
            --accent-grad: linear-gradient(135deg, #89b4fa, #b4befa);
            --text-color: #eee;
            --subtext-color: #888;
            --radius: 12px;
            --radius-lg: 20px;
            --radius-pill: 30px;
            --blur-bg: rgba(20, 20, 35, 0.72);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.2);
            --shadow-float: 0 4px 20px rgba(0, 0, 0, 0.15);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== Onboarding — Headspace-style 3-step flow ===== */
        .onboarding {
            position: relative; z-index: 1;
            background: linear-gradient(165deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            padding: 0 24px; min-height: 100vh;
            display: flex; flex-direction: column;
            transition: background 0.6s ease;
        }

        /* Progress dots */
        .progress-dots {
            display: flex; justify-content: center; gap: 8px;
            padding: calc(20px + env(safe-area-inset-top, 0px)) 0 16px;
        }
        .progress-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.3s var(--ease-spring);
        }
        .progress-dot.active {
            width: 24px; border-radius: 4px;
            background: var(--accent-color);
        }
        .progress-dot.done {
            background: var(--accent-color); opacity: 0.5;
        }

        /* Step container */
        .step-container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; position: relative;
        }
        .step {
            display: none;
            animation: stepIn 0.45s var(--ease-spring);
        }
        .step.active { display: flex; flex-direction: column; }
        @keyframes stepIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes stepOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-30px); }
        }

        .step-title {
            font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
            margin-bottom: 6px; color: var(--text-color);
        }
        .step-subtitle {
            font-size: 14px; color: var(--subtext-color);
            margin-bottom: 28px; font-weight: 400; line-height: 1.5;
        }

        /* Logo (step 1) */
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 72px; height: 72px; margin: 0 auto 16px;
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 36px; background: var(--accent-soft);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s var(--ease-spring);
        }
        .logo h1 {
            font-size: 28px; font-weight: 800; letter-spacing: -0.8px;
            background: linear-gradient(135deg, var(--accent-color), var(--text-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo p { color: var(--subtext-color); font-size: 14px; margin-top: 8px; font-weight: 400; }

        /* MBTI grid — larger, more visual */
        .mbti-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .mbti-btn {
            padding: 16px 4px; border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius); background: rgba(255, 255, 255, 0.03);
            cursor: pointer; font-weight: 700; font-size: 13px;
            color: var(--subtext-color); transition: all 0.3s var(--ease-spring);
            position: relative; overflow: hidden;
        }
        .mbti-btn:active { transform: scale(0.93); }
        .mbti-btn:hover { border-color: rgba(255, 255, 255, 0.2); color: var(--text-color); background: rgba(255, 255, 255, 0.05); }
        .mbti-btn.selected {
            background: var(--accent-color); color: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 6px 24px var(--accent-soft);
            transform: translateY(-3px);
        }

        /* MBTI reveal card */
        .mbti-reveal {
            text-align: center; margin-top: 20px;
            padding: 20px 16px; border-radius: var(--radius-lg);
            background: var(--accent-soft);
            border: 1px solid rgba(255, 255, 255, 0.06);
            animation: revealIn 0.5s var(--ease-spring);
        }
        @keyframes revealIn {
            from { opacity: 0; transform: scale(0.85) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .mbti-reveal .reveal-avatar {
            font-size: 40px; margin-bottom: 8px;
            display: block; line-height: 1;
        }
        .mbti-reveal .reveal-name {
            font-size: 18px; font-weight: 700; color: var(--text-color);
            margin-bottom: 4px;
        }
        .mbti-reveal .reveal-hint {
            font-size: 13px; color: var(--accent-color); font-weight: 500;
            line-height: 1.5;
        }

        /* Large selectable cards (step 2) */
        .option-cards { display: flex; flex-direction: column; gap: 10px; }
        .option-card {
            padding: 16px 18px; border-radius: var(--radius);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer; transition: all 0.25s var(--ease-smooth);
            display: flex; align-items: center; gap: 14px;
            position: relative; overflow: hidden;
        }
        .option-card:active { transform: scale(0.97); }
        .option-card:hover { border-color: rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.05); }
        .option-card.selected {
            border-color: var(--accent-color);
            background: var(--accent-soft);
        }
        .option-card.selected::after {
            content: '✓'; position: absolute; right: 18px;
            color: var(--accent-color); font-size: 18px; font-weight: 700;
        }
        .option-card .card-icon { font-size: 22px; flex-shrink: 0; }
        .option-card .card-text {
            font-size: 15px; font-weight: 500; color: var(--text-color);
        }

        /* Form input (step 3) */
        .form-input {
            width: 100%; padding: 16px 18px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius); font-size: 15px;
            background: rgba(255, 255, 255, 0.04); color: var(--text-color);
            transition: all 0.25s ease; font-family: inherit;
            resize: none; min-height: 80px;
        }
        .form-input::placeholder { color: var(--subtext-color); }
        .form-input:focus {
            outline: none; border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Pill buttons */
        .btn-pill {
            width: 100%; padding: 16px; margin-top: 12px;
            border: none; border-radius: var(--radius-pill);
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.25s var(--ease-smooth);
            letter-spacing: 0.3px; font-family: inherit;
        }
        .btn-pill:active { transform: scale(0.97); }
        .btn-pill:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-primary {
            background: var(--accent-color); color: #fff;
            box-shadow: 0 4px 20px var(--accent-soft);
        }
        .btn-primary:hover { opacity: 0.92; }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06); color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        .btn-row { display: flex; gap: 10px; margin-top: 12px; }
        .btn-row .btn-pill { flex: 1; margin-top: 0; }

        /* ===== Main App ===== */
        .main-app {
            display: none; flex: 1; flex-direction: column;
            min-height: 100vh; position: relative; z-index: 1;
            background: linear-gradient(165deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
        }

        /* Companion header — refined glassmorphism */
        .companion-header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px; padding-top: calc(12px + env(safe-area-inset-top, 0px));
            background: var(--blur-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.06);
        }
        .companion-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
            background: var(--accent-soft);
            border: 2px solid var(--accent-color);
            box-shadow: 0 2px 12px var(--accent-soft);
            transition: transform 0.3s var(--ease-spring);
        }
        .companion-avatar:active { transform: scale(0.9); }
        .companion-info { flex: 1; }
        .companion-name {
            font-size: 15px; font-weight: 700; color: var(--text-color);
            letter-spacing: -0.2px;
        }
        .companion-status { font-size: 12px; color: var(--subtext-color); margin-top: 2px; }
        .companion-status .dot {
            display: inline-block; width: 7px; height: 7px;
            background: #4ade80; border-radius: 50%; margin-right: 5px;
            box-shadow: 0 0 6px #4ade80;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .reset-btn {
            background: none; border: none; color: var(--subtext-color);
            font-size: 13px; cursor: pointer; padding: 8px 12px;
            border-radius: var(--radius-pill);
            transition: all 0.2s;
        }
        .reset-btn:hover { color: var(--accent-color); background: var(--accent-soft); }

        /* Chat area */
        .chat-area {
            flex: 1; overflow-y: auto; padding: 20px 16px 12px;
            display: flex; flex-direction: column; gap: 10px;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 3px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 2px; }

        /* Message bubbles — Replika-inspired gradient companion bubbles */
        .msg-bubble {
            max-width: 80%; padding: 12px 16px; font-size: 15px;
            line-height: 1.55; word-break: break-word;
            animation: msgIn 0.35s var(--ease-spring);
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .msg-companion {
            align-self: flex-start;
            background: var(--accent-grad);
            color: #fff;
            border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) 6px;
            box-shadow: 0 2px 16px var(--accent-soft);
        }
        .msg-user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-color);
            border-radius: var(--radius-lg) var(--radius-lg) 6px var(--radius-lg);
            border: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        /* Recommendation card — Spotify-inspired refined design */
        .rec-card {
            align-self: flex-start; max-width: 92%;
            background: var(--card-color);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-lg); overflow: hidden;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            box-shadow: var(--shadow-card);
            animation: cardIn 0.5s var(--ease-spring);
            transition: transform 0.2s var(--ease-smooth);
        }
        .rec-card:active { transform: scale(0.98); }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Visual header — refined gradient + emoji with overlay */
        .rec-card-visual {
            width: 100%; height: 160px;
            display: flex; align-items: center; justify-content: center;
            font-size: 56px; position: relative; overflow: hidden;
        }
        .rec-card-visual::after {
            content: ''; position: absolute; inset: 0;
            background:
                radial-gradient(circle at 25% 30%, rgba(255, 255, 255, 0.22) 0%, transparent 45%),
                radial-gradient(circle at 75% 70%, rgba(255, 255, 255, 0.14) 0%, transparent 45%);
        }
        .rec-card-visual::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(0, 0, 0, 0.3) 100%);
        }
        .rec-card-visual .deco-circle {
            position: absolute; border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            pointer-events: none;
        }
        .rec-card-visual .deco-circle.c1 { width: 90px; height: 90px; top: -25px; right: -15px; }
        .rec-card-visual .deco-circle.c2 { width: 55px; height: 55px; bottom: -15px; left: -10px; }
        .rec-card-visual .deco-circle.c3 { width: 30px; height: 30px; top: 35%; right: 18%; background: rgba(255,255,255,0.05); }
        .rec-card-visual .emoji {
            position: relative; z-index: 1;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
            animation: floatEmoji 3s ease-in-out infinite;
        }
        .rec-card-visual .bg-emoji {
            position: absolute; font-size: 120px; opacity: 0.08;
            z-index: 0; pointer-events: none;
        }
        @keyframes floatEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .rec-card-body { padding: 16px 18px 18px; }
        .rec-card-category {
            display: inline-block; font-size: 11px; padding: 3px 12px;
            background: var(--accent-soft); border-radius: var(--radius-pill);
            color: var(--accent-color); margin-bottom: 10px; font-weight: 600;
            letter-spacing: 0.3px;
        }
        .rec-card-title {
            font-size: 18px; font-weight: 700; color: var(--text-color);
            margin-bottom: 6px; letter-spacing: -0.3px;
        }
        .rec-card-text {
            color: var(--text-color); font-size: 14px; line-height: 1.6;
            margin-bottom: 10px; opacity: 0.88;
        }
        .rec-card-tips {
            font-size: 12px; color: var(--subtext-color); line-height: 1.5;
            padding: 10px 14px; background: rgba(0, 0, 0, 0.15);
            border-radius: 10px; margin-bottom: 8px;
            border-left: 2px solid var(--accent-color);
        }
        .rec-card-tips strong { color: var(--accent-color); font-weight: 600; }

        .rec-card-meta {
            display: flex; gap: 12px; margin-bottom: 12px;
            font-size: 12px; color: var(--subtext-color);
        }
        .rec-card-meta span { display: flex; align-items: center; gap: 3px; }

        .rec-card-action {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; padding: 14px; text-align: center;
            background: var(--accent-color); color: #fff; text-decoration: none;
            border: none; border-radius: var(--radius-pill); font-size: 15px;
            font-weight: 600; cursor: pointer;
            transition: all 0.2s var(--ease-smooth);
        }
        .rec-card-action:active { transform: scale(0.97); }
        .rec-card-action:hover { opacity: 0.92; box-shadow: 0 4px 20px var(--accent-soft); }

        /* Input bar — refined glassmorphism */
        .input-bar {
            position: sticky; bottom: 0; z-index: 100;
            background: var(--blur-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.06);
            padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        }
        .quick-actions {
            display: flex; gap: 7px; margin-bottom: 10px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .quick-actions::-webkit-scrollbar { display: none; }
        .quick-btn {
            flex-shrink: 0; padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-pill); background: rgba(255, 255, 255, 0.04);
            color: var(--subtext-color); font-size: 13px; cursor: pointer;
            transition: all 0.2s var(--ease-smooth); font-family: inherit;
        }
        .quick-btn:active { transform: scale(0.93); }
        .quick-btn:hover { border-color: var(--accent-color); color: var(--accent-color); background: var(--accent-soft); }

        .input-row { display: flex; gap: 8px; align-items: center; }
        .input-row input {
            flex: 1; padding: 12px 18px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-pill); font-size: 15px;
            background: rgba(255, 255, 255, 0.04); color: var(--text-color);
            transition: all 0.25s ease; font-family: inherit;
        }
        .input-row input::placeholder { color: var(--subtext-color); }
        .input-row input:focus {
            outline: none; border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.06);
        }
        .send-btn {
            width: 44px; height: 44px; border: none; border-radius: 50%;
            background: var(--accent-color); color: #fff; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s var(--ease-spring); flex-shrink: 0;
            box-shadow: 0 2px 16px var(--accent-soft);
        }
        .send-btn:active { transform: scale(0.88); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Breathing circle loader — Calm-inspired */
        .typing-bubble {
            align-self: flex-start;
            padding: 16px 20px;
            animation: msgIn 0.3s ease;
        }
        .breathing-circle {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid var(--accent-color);
            position: relative;
            animation: breathe 2s ease-in-out infinite;
        }
        .breathing-circle::after {
            content: ''; position: absolute; inset: -6px;
            border-radius: 50%; border: 1px solid var(--accent-color);
            opacity: 0.3;
            animation: breatheRing 2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(0.75); opacity: 0.6; }
            50% { transform: scale(1); opacity: 1; }
        }
        @keyframes breatheRing {
            0%, 100% { transform: scale(0.8); opacity: 0.1; }
            50% { transform: scale(1.15); opacity: 0.3; }
        }

        /* Date separator */
        .date-sep {
            text-align: center; font-size: 12px; color: var(--subtext-color);
            margin: 8px 0; font-weight: 500;
            position: relative;
        }
        .date-sep::before, .date-sep::after {
            content: ''; display: inline-block; width: 30px; height: 1px;
            background: rgba(255, 255, 255, 0.08);
            vertical-align: middle; margin: 0 10px;
        }

        .hidden { display: none !important; }

        /* Page transition */
        .page-enter { animation: pageIn 0.5s var(--ease-smooth); }
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Streaming text cursor */
        .streaming-cursor {
            display: inline-block; width: 2px; height: 1em;
            background: currentColor; margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.8s steps(2) infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>
    <div class="container">
        <!-- ===== Onboarding (3-step flow) ===== -->
        <div id="onboarding" class="onboarding">
            <!-- Progress dots -->
            <div class="progress-dots">
                <div class="progress-dot active" id="dot1"></div>
                <div class="progress-dot" id="dot2"></div>
                <div class="progress-dot" id="dot3"></div>
            </div>

            <div class="step-container">
                <!-- Step 1: MBTI Selection -->
                <div class="step active" id="step1">
                    <div class="logo">
                        <div class="logo-icon" id="logoIcon">✨</div>
                        <h1>OneDayReco</h1>
                        <p id="logoSubtitle">你的私人活动搭子</p>
                    </div>
                    <div class="step-title">先认识一下</div>
                    <div class="step-subtitle">选一下你的 MBTI，我来匹配你的搭子</div>
                    <div class="mbti-grid" id="mbtiGrid"></div>
                    <div id="mbtiRevealContainer"></div>

        // ===== Show MBTI reveal card =====
        function showMbtiReveal(mbti) {
            const theme = themeMap[mbti];
            const form = mbtiFormMap[mbti];
            const container = document.getElementById('mbtiRevealContainer');
            container.innerHTML = `
                <div class="mbti-reveal">
                    <span class="reveal-avatar">${theme.avatar}</span>
                    <div class="reveal-name">${theme.name}</div>
                    <div class="reveal-hint">${form.hint}</div>
                </div>
            `;
        }

        // ===== Step navigation =====
        function goToStep(step) {
            if (step === 2 && !selectedMbti) return;

            // Update progress dots
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('dot' + i);
                dot.classList.remove('active', 'done');
                if (i < step) dot.classList.add('done');
                else if (i === step) dot.classList.add('active');
            }

            // Transition steps
            const currentStepEl = document.getElementById('step' + currentStep);
            const nextStepEl = document.getElementById('step' + step);

            currentStepEl.style.animation = 'stepOut 0.3s var(--ease-smooth) forwards';
            setTimeout(() => {
                currentStepEl.classList.remove('active');
                nextStepEl.classList.add('active');
                nextStepEl.style.animation = 'stepIn 0.45s var(--ease-spring)';
                currentStep = step;

                if (step === 2) {
                    updateFormForMbti(selectedMbti);
                    const persona = mbtiPersonaMap[selectedMbti];
                    if (persona) {
                        document.getElementById('step2Title').textContent = persona.step2Title;
                        document.getElementById('step2Subtitle').textContent = persona.step2Sub;
                    }
                }
                if (step === 3) {
                    const form = mbtiFormMap[selectedMbti];
                    const persona = mbtiPersonaMap[selectedMbti];
                    if (persona) {
                        document.getElementById('step3Title').textContent = persona.step3Title;
                        document.getElementById('step3Subtitle').textContent = persona.step3Sub;
                    }
                    document.getElementById('step3Subtitle').textContent = form.notes.label.replace('（选填）', '').replace('（选填）', '');
                    document.getElementById('notes').placeholder = form.notes.placeholder;
                }
            }, 250);
        }

        // ===== Apply theme =====
        function applyTheme(mbti) {
            const theme = themeMap[mbti];
            if (!theme) return;
            const root = document.documentElement;
            root.style.setProperty('--bg-color', theme.colors.bg);
            root.style.setProperty('--bg-grad-1', theme.colors.bg);
            root.style.setProperty('--bg-grad-2', theme.colors.bg2);
            root.style.setProperty('--card-color', theme.colors.card);
            root.style.setProperty('--card-solid', theme.colors.cardSolid);
            root.style.setProperty('--accent-color', theme.colors.accent);
            root.style.setProperty('--accent-soft', theme.colors.accentSoft);
            root.style.setProperty('--accent-grad', theme.colors.accentGrad || `linear-gradient(135deg, ${theme.colors.accent}, ${theme.colors.accent})`);
            root.style.setProperty('--text-color', theme.colors.text);
            root.style.setProperty('--subtext-color', theme.colors.subtext);
            root.style.setProperty('--radius', theme.radius);
        }

        // ===== Personalize form for MBTI (step 2) =====
        function updateFormForMbti(mbti) {
            const form = mbtiFormMap[mbti];
            if (!form) return;

            // Social frequency
            document.getElementById('socialLabel').textContent = form.social.label;
            document.getElementById('socialIcon').textContent = form.social.icon;
            const socialCards = document.getElementById('socialCards');
            socialCards.innerHTML = '';
            selectedSocial = null;
            form.social.options.forEach((opt, idx) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.style.animation = `msgIn 0.35s var(--ease-spring) ${idx * 60}ms both`;
                card.innerHTML = `<span class="card-icon">${form.social.icon}</span><span class="card-text">${opt}</span>`;
                card.onclick = () => {
                    socialCards.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedSocial = opt;
                    checkStep2Ready();
                };
                socialCards.appendChild(card);
            });

            // Budget
            document.getElementById('budgetLabel').textContent = form.budget.label;
            document.getElementById('budgetIcon').textContent = form.budget.icon;
            const budgetCards = document.getElementById('budgetCards');
            budgetCards.innerHTML = '';
            selectedBudget = null;
            form.budget.options.forEach((opt, idx) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.style.animation = `msgIn 0.35s var(--ease-spring) ${(idx + 4) * 60}ms both`;
                card.innerHTML = `<span class="card-icon">${form.budget.icon}</span><span class="card-text">${opt}</span>`;
                card.onclick = () => {
                    budgetCards.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedBudget = opt;
                    checkStep2Ready();
                };
                budgetCards.appendChild(card);
            });
        }

        function checkStep2Ready() {
            document.getElementById('step2Next').disabled = !(selectedSocial && selectedBudget);
        }

        // ===== Apply persona content (quick actions, status, placeholder) =====
        function applyPersona(mbti) {
            const persona = mbtiPersonaMap[mbti];
            if (!persona) return;

            // Quick actions
            const qaContainer = document.getElementById('quickActions');
            qaContainer.innerHTML = '';
            persona.quickActions.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'quick-btn';
                btn.textContent = text;
                btn.onclick = () => sendQuickMessage(text);
                qaContainer.appendChild(btn);
            });

            // Companion status
            document.getElementById('companionStatus').textContent = persona.status;

            // Chat input placeholder
            document.getElementById('chatInput').placeholder = persona.placeholder;

            // Step titles
            document.querySelector('#step1 .step-title').textContent = persona.step1Title;
            document.querySelector('#step1 .step-subtitle').textContent = persona.step1Sub;
            document.getElementById('step2Title').textContent = persona.step2Title;
            document.getElementById('step2Subtitle').textContent = persona.step2Sub;
            document.getElementById('step3Title').textContent = persona.step3Title;
            document.getElementById('step3Subtitle').textContent = persona.step3Sub;
        }

        // ===== Start app =====
        function startApp() {
            const notes = document.getElementById('notes').value;

            currentUser = {
                user_id: 'user_' + Date.now(),
                mbti: selectedMbti,
                preferences: {
                    social_frequency: selectedSocial,
                    budget: selectedBudget,
                    notes: notes,
                },
                feedback_summary: ''
            };

            // Persist to localStorage
            try {
                localStorage.setItem('onedayreco_user', JSON.stringify({
                    mbti: selectedMbti,
                    social: selectedSocial,
                    budget: selectedBudget,
                    notes: notes
                }));
            } catch(e) {}

            applyTheme(selectedMbti);
            applyPersona(selectedMbti);
            const theme = themeMap[selectedMbti];

            // Update companion info
            document.getElementById('companionAvatar').textContent = theme.avatar;
            document.getElementById('companionName').textContent = theme.name;

            // Page transition
            const onb = document.getElementById('onboarding');
            onb.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            onb.style.opacity = '0';
            onb.style.transform = 'translateY(-20px)';

            setTimeout(() => {
                onb.classList.add('hidden');
                const mainApp = document.getElementById('mainApp');
                mainApp.style.display = 'flex';
                mainApp.classList.add('page-enter');
                fetchRecommendations();
            }, 300);
        }

        // ===== Fetch recommendations =====
        async function fetchRecommendations() {
            showTyping();
            try {
                const response = await fetch(`${API_BASE}/api/recommend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_profile: currentUser,
                        context: { weather: '晴', location: '当前位置' }
                    })
                });
                const data = await response.json();
                hideTyping();

                addDateSeparator();

                if (data.agent_message) {
                    streamMessage(data.agent_message);
                    chatHistory.push({ role: 'assistant', content: data.agent_message });
                }

                if (data.recommendations && data.recommendations.length > 0) {
                    data.recommendations.forEach((rec, i) => {
                        setTimeout(() => addRecommendationCard(rec), (data.agent_message ? data.agent_message.length * 30 + 200 : 0) + i * 200);
                    });
                }
            } catch (error) {
                hideTyping();
                addCompanionMessage('连接出了点问题，你稍等一下再试试～');
            }
        }

        // ===== Send message =====
        function sendMessage() {
            if (isWaiting) return;
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            addUserMessage(text);
            chatHistory.push({ role: 'user', content: text });
            callChat(text);
        }

        function sendQuickMessage(text) {
            if (isWaiting) return;
            addUserMessage(text);
            chatHistory.push({ role: 'user', content: text });
            callChat(text);
        }

        async function callChat(message) {
            isWaiting = true;
            document.getElementById('sendBtn').disabled = true;
            showTyping();

            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_profile: currentUser,
                        message: message,
                        context: { weather: '晴', location: '当前位置' },
                        history: chatHistory
                    })
                });
                const data = await response.json();
                hideTyping();

                if (data.reply) {
                    streamMessage(data.reply);
                    chatHistory.push({ role: 'assistant', content: data.reply });
                }

                if (data.recommendations && data.recommendations.length > 0) {
                    data.recommendations.forEach((rec, i) => {
                        setTimeout(() => addRecommendationCard(rec), (data.reply ? data.reply.length * 30 + 200 : 0) + i * 200);
                    });
                }
            } catch (error) {
                hideTyping();
                addCompanionMessage('出了点小问题，再跟我说一次？');
            } finally {
                isWaiting = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // ===== Streaming text effect =====
        function streamMessage(text) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'msg-bubble msg-companion';
            area.appendChild(div);
            scrollToBottom();

            let idx = 0;
            const cursor = '<span class="streaming-cursor"></span>';

            function typeNext() {
                if (idx <= text.length) {
                    div.innerHTML = text.substring(0, idx) + cursor;
                    idx++;
                    scrollToBottom();
                    setTimeout(typeNext, 25);
                } else {
                    div.innerHTML = text;
                }
            }
            typeNext();
        }

        // ===== UI render helpers =====

        function addUserMessage(text) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'msg-bubble msg-user';
            div.textContent = text;
            area.appendChild(div);
            scrollToBottom();
        }

        function addCompanionMessage(text) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'msg-bubble msg-companion';
            div.textContent = text;
            area.appendChild(div);
            scrollToBottom();
        }

        function addDateSeparator() {
            const area = document.getElementById('chatArea');
            const now = new Date();
            const dateStr = `${now.getMonth() + 1}月${now.getDate()}日`;
            const div = document.createElement('div');
            div.className = 'date-sep';
            div.textContent = dateStr;
            area.appendChild(div);
        }

        function addRecommendationCard(rec) {
            const area = document.getElementById('chatArea');
            const card = document.createElement('div');
            card.className = 'rec-card';

            const cat = rec.category || '城市探索';
            const visual = categoryVisuals[cat] || categoryVisuals['城市探索'];

            let html = '';

            // Visual header
            html += `<div class="rec-card-visual" style="background: ${visual.gradient}">`;
            html += `<div class="deco-circle c1"></div>`;
            html += `<div class="deco-circle c2"></div>`;
            html += `<div class="deco-circle c3"></div>`;
            html += `<span class="bg-emoji">${visual.emoji}</span>`;
            html += `<span class="emoji">${visual.emoji}</span>`;
            html += `</div>`;

            html += `<div class="rec-card-body">`;
            if (rec.category) {
                html += `<span class="rec-card-category">${rec.category}</span>`;
            }
            html += `<div class="rec-card-title">${rec.activity_name}</div>`;
            if (rec.recommend_text) {
                html += `<div class="rec-card-text">${rec.recommend_text}</div>`;
            }

            // Meta tags
            let metaHtml = '<div class="rec-card-meta">';
            if (rec.budget) metaHtml += `<span>💰 ${rec.budget}</span>`;
            metaHtml += '</div>';
            html += metaHtml;

            if (rec.tips) {
                html += `<div class="rec-card-tips"><strong>建议</strong> · ${rec.tips}</div>`;
            }
            if (rec.safety_note) {
                html += `<div class="rec-card-tips"><strong>注意</strong> · ${rec.safety_note}</div>`;
            }
            if (rec.action_url) {
                html += `<a class="rec-card-action" href="${rec.action_url}" target="_blank" rel="noopener">${rec.action_label || '去看看'} →</a>`;
            }
            html += `</div>`;

            card.innerHTML = html;
            area.appendChild(card);
            scrollToBottom();
        }

        function showTyping() {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'typing-bubble';
            div.id = 'typingBubble';
            div.innerHTML = '<div class="breathing-circle"></div>';
            area.appendChild(div);
            scrollToBottom();
        }

        function hideTyping() {
            const el = document.getElementById('typingBubble');
            if (el) el.remove();
        }

        function scrollToBottom() {
            const area = document.getElementById('chatArea');
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
        }

        function resetApp() {
            // Clear persisted data
            try { localStorage.removeItem('onedayreco_user'); } catch(e) {}

            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('mainApp').classList.remove('page-enter');
            const onb = document.getElementById('onboarding');
            onb.classList.remove('hidden');
            onb.style.opacity = '1';
            onb.style.transform = 'translateY(0)';
            document.getElementById('chatArea').innerHTML = '';

            // Reset state
            selectedMbti = null;
            selectedSocial = null;
            selectedBudget = null;
            chatHistory = [];
            currentStep = 1;

            // Reset UI
            document.querySelectorAll('.mbti-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('mbtiRevealContainer').innerHTML = '';
            document.getElementById('step1Next').disabled = true;
            document.getElementById('notes').value = '';

            // Show step 1 (full onboarding)
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step1').classList.add('active');
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('dot' + i);
                dot.classList.remove('active', 'done');
                if (i === 1) dot.classList.add('active');
            }

            // Show step1 back button as "返回" → step1 (MBTI selection)
            document.getElementById('step2Back').onclick = () => goToStep(1);
            document.getElementById('step2Back').textContent = '返回';

            applyTheme('INTP');
        }

        // ===== Check for returning user on page load =====
        function checkReturningUser() {
            try {
                const saved = localStorage.getItem('onedayreco_user');
                if (!saved) return false;
                const data = JSON.parse(saved);
                if (!data.mbti || !themeMap[data.mbti]) return false;

                // Restore state
                selectedMbti = data.mbti;
                selectedSocial = data.social || null;
                selectedBudget = data.budget || null;

                // Apply theme & persona immediately
                applyTheme(selectedMbti);
                applyPersona(selectedMbti);

                // Show step 2 directly (skip MBTI selection)
                currentStep = 1; // start from 1 so goToStep(2) animates correctly

                // Update progress dots — skip dot1 (done), activate dot2
                for (let i = 1; i <= 3; i++) {
                    const dot = document.getElementById('dot' + i);
                    dot.classList.remove('active', 'done');
                    if (i < 2) dot.classList.add('done');
                    else if (i === 2) dot.classList.add('active');
                }

                // Show step 2, hide step 1
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                currentStep = 2;

                // Render form with saved MBTI
                updateFormForMbti(selectedMbti);

                // Restore notes if saved
                if (data.notes) document.getElementById('notes').value = data.notes;

                // Change step2 back button to go to main app (cancel re-config)
                const backBtn = document.getElementById('step2Back');
                backBtn.textContent = '返回';
                backBtn.onclick = () => {
                    // Go directly to main app with saved data
                    startAppFromSaved();
                };

                // If social & budget already selected, enable next
                if (selectedSocial && selectedBudget) {
                    // Re-render to show selected state
                    updateFormForMbti(selectedMbti);
                    // Re-select saved options
                    setTimeout(() => {
                        document.querySelectorAll('#socialCards .option-card').forEach(card => {
                            if (card.querySelector('.card-text').textContent === selectedSocial) {
                                card.classList.add('selected');
                            }
                        });
                        document.querySelectorAll('#budgetCards .option-card').forEach(card => {
                            if (card.querySelector('.card-text').textContent === selectedBudget) {
                                card.classList.add('selected');
                            }
                        });
                        checkStep2Ready();
                    }, 100);
                }

                return true;
            } catch(e) {
                return false;
            }
        }

        // ===== Start app from saved data (skip onboarding) =====
        function startAppFromSaved() {
            const notes = document.getElementById('notes').value;

            currentUser = {
                user_id: 'user_' + Date.now(),
                mbti: selectedMbti,
                preferences: {
                    social_frequency: selectedSocial,
                    budget: selectedBudget,
                    notes: notes,
                },
                feedback_summary: ''
            };

            // Update localStorage with latest preferences
            try {
                localStorage.setItem('onedayreco_user', JSON.stringify({
                    mbti: selectedMbti,
                    social: selectedSocial,
                    budget: selectedBudget,
                    notes: notes
                }));
            } catch(e) {}

            applyTheme(selectedMbti);
            applyPersona(selectedMbti);
            const theme = themeMap[selectedMbti];

            document.getElementById('companionAvatar').textContent = theme.avatar;
            document.getElementById('companionName').textContent = theme.name;

            const onb = document.getElementById('onboarding');
            onb.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            onb.style.opacity = '0';
            onb.style.transform = 'translateY(-20px)';

            setTimeout(() => {
                onb.classList.add('hidden');
                const mainApp = document.getElementById('mainApp');
                mainApp.style.display = 'flex';
                mainApp.classList.add('page-enter');
                fetchRecommendations();
            }, 300);
        }

        // Initialize with default theme, check for returning user
        applyTheme('INTP');
        checkReturningUser();
    </script>
</body>
</html>
